services:
  temporal-db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"   # optional: maps to host 5433 so it doesn't conflict with your other Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.24
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.26.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"

  notifications-service:
    image: notifications-service:0.1.0
    depends_on:
      - temporal
    environment:
      SERVER_PORT: "8081"
      # IMPORTANT: this must be consumed by your app (we’ll fix code next)
      TEMPORAL_TARGET: "temporal:7233"
    ports:
      - "8081:8081"
