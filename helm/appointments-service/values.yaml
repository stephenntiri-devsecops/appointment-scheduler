replicaCount: 2

image:
  repository: REPLACE_WITH_ECR_REPO/appointments-service
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  SPRING_PROFILES_ACTIVE: "k8s"
  DB_HOST: "REPLACE"
  DB_PORT: "5432"
  DB_NAME: "scheduler"
  DB_USER: "scheduler"
  DB_PASSWORD_SECRET_NAME: "appointments-db" # use ExternalSecret/SecretsManager CSI in prod
  TEMPORAL_TARGET: "temporal-frontend.temporal.svc:7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "appointment-notifications"

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

ingress:
  enabled: true
  className: alb
  host: "api.example.com"
  annotations: {}
